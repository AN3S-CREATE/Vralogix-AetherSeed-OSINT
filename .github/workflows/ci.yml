name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint · type-check · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff (lint)
        run: uv run ruff check aetherseed tests

      - name: Mypy (strict types)
        run: uv run mypy aetherseed

      - name: Pytest (offline suite + coverage)
        run: uv run pytest --cov=aetherseed --cov-report=term-missing --cov-report=xml

      - name: Alembic migration applies cleanly
        env:
          AETHERSEED_DATABASE_URL: sqlite+pysqlite:///./data/ci.sqlite3
        run: |
          mkdir -p data
          uv run alembic upgrade head
          uv run alembic current

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
