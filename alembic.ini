# Alembic configuration for AetherSeed.
# The database URL is injected at runtime from application settings
# (AETHERSEED_DATABASE_URL); the value below is only a placeholder.
[alembic]
script_location = db
prepend_sys_path = .
path_separator = os
sqlalchemy.url = sqlite+pysqlite:///./data/aetherseed.sqlite3

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
